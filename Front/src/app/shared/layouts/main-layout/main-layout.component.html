<div class="drawer lg:drawer-open">
  <input id="main-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content flex flex-col">
    <!-- Navbar Mobile -->

    <div class="navbar bg-base-100 shadow lg:hidden">
      <div class="flex-none">
        <label for="main-drawer" class="btn btn-square btn-ghost"> ☰ </label>
      </div>

      <div class="flex-1">
        <span class="font-bold"> Tekus Provider Management </span>
      </div>
    </div>

    <div class="p-6">
      <router-outlet />
    </div>
  </div>

  <div class="drawer-side">
    <label for="main-drawer" class="drawer-overlay"> </label>

    <aside class="w-72 min-h-full bg-base-100 border-r border-base-300">
      <div class="p-6">
        <h2 class="text-xl font-bold">Tekus</h2>

        <p class="text-sm opacity-70">Provider Management</p>
      </div>

      <ul class="menu p-4 gap-2">
        <li>
          <a routerLink="/dashboard"> 📊 Dashboard </a>
        </li>

        <li>
          <a routerLink="/providers"> 🏢 Providers </a>
        </li>

        <li>
          <a routerLink="/services"> 🛠️ Services </a>
        </li>
      </ul>

      <div class="absolute bottom-0 w-full p-4">
        <button class="btn btn-error btn-outline w-full" (click)="logout()">
          Logout
        </button>
      </div>
    </aside>
  </div>
</div>
